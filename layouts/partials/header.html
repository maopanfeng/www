<header style="position: fixed; top: 0; left: 0; right: 0; height: 80px; z-index: 9999; border-bottom: 1px solid rgba(0,0,0,0.06); background-color: rgba(255,255,255,0.9); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);" class="dark:bg-black/90 dark:border-white/10">
  <div style="max-width: 960px; height: 100%; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-sizing: border-box; gap: 20px;">
    <a href="{{ if eq .Lang "cn" }}/cn/{{ else }}/{{ end }}" style="display: flex; align-items: center; text-decoration: none; color: inherit; border: none; flex: 0 0 auto;">
      <div style="width: 38px; height: 38px; border-radius: 50%; overflow: hidden; margin-right: 12px; background: #eee;">
        <img src="{{ "avatar.png" | relURL }}?v={{ now.Unix }}" alt="logo" style="width: 100%; height: 100%; object-fit: cover;">
      </div>
      <span style="font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em; white-space: nowrap;">{{ site.Title }}</span>
    </a>

    <nav style="display: flex; gap: 14px; align-items: center; justify-content: flex-end; overflow-x: auto; scrollbar-width: none;">
      {{ if eq .Lang "en" }}
      <a href="/cn/" class="nav-link lang-switch">中文</a>
      <a href="/genius" class="nav-link">Genius</a>
      <a href="/stocks" class="nav-link">Stocks</a>
      <a href="/notes" class="nav-link">Notes</a>
      <a href="/blogs" class="nav-link">Blogs</a>
      <a href="/books" class="nav-link">Books</a>
      <a href="/wiki" class="nav-link">Wiki</a>
      <a href="/about" class="nav-link">About</a>
      {{ else }}
      <a href="/" class="nav-link lang-switch">EN</a>
      <a href="/cn/genius" class="nav-link">Genius</a>
      <a href="/cn/stocks" class="nav-link">Stocks</a>
      <a href="/cn/notes" class="nav-link">Notes</a>
      <a href="/cn/blogs" class="nav-link">Blogs</a>
      <a href="/cn/books" class="nav-link">Books</a>
      <a href="/cn/wiki" class="nav-link">Wiki</a>
      <a href="/cn/about" class="nav-link">About</a>
      {{ end }}
    </nav>
  </div>
</header>
