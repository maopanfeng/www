<header style="position: fixed; top: 0; left: 0; right: 0; height: 80px; z-index: 9999; border-bottom: 1px solid rgba(0,0,0,0.06); background-color: rgba(255,255,255,0.9); -webkit-backdrop-filter: blur(10px); backdrop-filter: blur(10px);" class="dark:bg-black/90 dark:border-white/10">
  <div style="max-width: 720px; height: 100%; margin: 0 auto; display: flex; align-items: center; justify-content: space-between; padding: 0 24px; box-sizing: border-box;">
    
    <a href="/" style="display: flex; align-items: center; text-decoration: none; color: inherit; border: none;">
      <div style="width: 38px; height: 38px; border-radius: 50%; overflow: hidden; margin-right: 12px; background: #eee;">
        <img src="{{ "avatar.png" | relURL }}?v={{ now.Unix }}" alt="logo" style="width: 100%; height: 100%; object-fit: cover;">
      </div>
      <span style="font-size: 1.15rem; font-weight: 700; letter-spacing: -0.02em;">{{ site.Title }}</span>
    </a>

    <nav style="display: flex; gap: 24px; align-items: center;">
      {{ range site.Menus.main }}
      <a href="{{ .URL }}" style="text-decoration: none; color: inherit; font-size: 14px; font-weight: 500; opacity: 0.6; transition: opacity 0.2s;">{{ .Name }}</a>
      {{ end }}
    </nav>
  </div>
</header>
