<!doctype html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>{{ .Title }} - Ben Thinking</title>
    <link rel="stylesheet" href="/main.css">
    <style>
        body { margin:0; padding:0; font-family:-apple-system,sans-serif; background-color:#fff; color:#000; }
        .container { max-width:720px; margin:120px auto; padding:0 24px; }
        .post-item { margin-bottom: 3rem; }
        .post-title { font-size: 1.5rem; font-weight: 700; text-decoration:none; color:inherit; }
        header { position:fixed; top:0; left:0; right:0; height:80px; border-bottom:1px solid rgba(0,0,0,0.06); background:rgba(255,255,255,0.9); backdrop-filter:blur(10px); z-index:999; }
        .nav-container { max-width:720px; height:100%; margin:0 auto; display:flex; align-items:center; padding:0 24px; }
    </style>
</head>
<body>
    <header><div class="nav-container"><a href="/" style="font-weight:700;text-decoration:none;color:inherit;">Ben Thinking</a></div></header>
    <div class="container">
        <h1 style="opacity:0.3; margin-bottom:4rem;">{{ .Title }} 年的文章</h1>
        {{ range .Pages }}
        <div class="post-item">
            <a href="{{ .Permalink }}" class="post-title">{{ .Title }}</a>
            <div style="opacity:0.3; margin-top:0.5rem;">{{ .Date.Format "2006-01-02" }}</div>
        </div>
        {{ end }}
    </div>
</body>
</html>
