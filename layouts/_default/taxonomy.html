<!doctype html>
<html lang="zh-cn">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1,shrink-to-fit=no">
    <title>{{ .Title }} - Growth Investing</title>
    <link rel="stylesheet" href="/main.css">
    <style>
        body { margin:0; padding:0; font-family:-apple-system,sans-serif; background-color:#fff; color:#000; }
        .container { max-width:720px; margin:120px auto; padding:0 24px; }
        .post-item { margin-bottom: 3rem; }
        .post-title { font-size: 1.5rem; font-weight: 700; text-decoration:none; color:inherit; }
        header { position:fixed; top:0; left:0; right:0; height:80px; border-bottom:1px solid rgba(0,0,0,0.06); background:rgba(255,255,255,0.9); backdrop-filter:blur(10px); z-index:999; }
        .nav-container { max-width:960px; height:100%; margin:0 auto; display:flex; align-items:center; justify-content:space-between; gap:20px; padding:0 24px; }
        .nav-right { display:flex; align-items:center; gap:14px; justify-content:flex-end; overflow-x:auto; scrollbar-width:none; }
        .nav-link { font-size:14px; opacity:0.6; text-decoration:none; color:inherit; font-weight:500; white-space:nowrap; }
        .nav-link:hover { opacity:1; }
        .lang-switch { font-size:12px; opacity:0.4; font-weight:700; }
    </style>
</head>
<body>
    <header>
        <div class="nav-container">
            <a href="{{ if eq .Lang "cn" }}/cn/{{ else }}/{{ end }}" style="font-weight:700;text-decoration:none;color:inherit;white-space:nowrap;">Growth Investing</a>
            <nav class="nav-right">
                {{ if eq .Lang "en" }}
                    <a href="/cn/" class="lang-switch nav-link">中文</a>
                    <a href="/genius" class="nav-link">Genius</a>
                    <a href="/stocks" class="nav-link">Stocks</a>
                    <a href="/notes" class="nav-link">Notes</a>
                    <a href="/blogs" class="nav-link">Blogs</a>
                    <a href="/books" class="nav-link">Books</a>
                    <a href="/wiki" class="nav-link">Wiki</a>
                    <a href="/about" class="nav-link">About</a>
                {{ else }}
                    <a href="/" class="lang-switch nav-link">EN</a>
                    <a href="/cn/genius" class="nav-link">Genius</a>
                    <a href="/cn/stocks" class="nav-link">Stocks</a>
                    <a href="/cn/notes" class="nav-link">Notes</a>
                    <a href="/cn/blogs" class="nav-link">Blogs</a>
                    <a href="/cn/books" class="nav-link">Books</a>
                    <a href="/cn/wiki" class="nav-link">Wiki</a>
                    <a href="/cn/about" class="nav-link">About</a>
                {{ end }}
            </nav>
        </div>
    </header>
    <div class="container">
        <h1 style="opacity:0.3; margin-bottom:4rem;">{{ .Title }} 年的文章</h1>
        {{ range .Pages }}
        <div class="post-item">
            <a href="{{ .Permalink }}" class="post-title">{{ .Title }}</a>
            <div style="opacity:0.3; margin-top:0.5rem;">{{ .Date.Format "2006-01-02" }}</div>
        </div>
        {{ end }}
    </div>
</body>
</html>
